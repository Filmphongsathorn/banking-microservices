spring:
  application:
    name: api-gateway
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}
      username: ${CONFIG_SERVER_USERNAME:config-admin}
      password: ${CONFIG_SERVER_PASSWORD:config-secret-2024}
      fail-fast: false
      retry:
        max-attempts: 5
        initial-interval: 1000
        max-interval: 5000
        multiplier: 1.5
