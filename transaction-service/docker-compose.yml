version: '3.8'

services:
  # ====================================================
  # PostgreSQL - transaction_db
  # ====================================================
  transaction-db:
    image: postgres:16-alpine
    container_name: transaction-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: txuser
      POSTGRES_PASSWORD: txpassword
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"   # port 5433 เพื่อไม่ชนกับ account-service db
    volumes:
      - transaction_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txuser -d transaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====================================================
  # Redis - Idempotency Store
  # ====================================================
  redis:
    image: redis:7-alpine
    container_name: transaction-redis
    restart: unless-stopped
    command: redis-server --requirepass "" --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ====================================================
  # Kafka + Zookeeper
  # ====================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Kafka UI (optional - for debugging)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  # ====================================================
  # Transaction Service
  # ====================================================
  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transaction-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_HOST: transaction-db
      DB_PORT: 5432
      DB_NAME: transaction_db
      DB_USERNAME: txuser
      DB_PASSWORD: txpassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
      ACCOUNT_SERVICE_URL: http://account-service:8081
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      transaction-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  transaction_db_data:
  redis_data:
